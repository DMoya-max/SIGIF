{{ load static }}
<!DOCTYPE html>
<html>
<head>
    <title>Lista de Usuarios</title>
</head>
<body>
    <h1>Usuarios</h1>

    <a href="{% url 'crear_usuarios' %}">➕ Crear nuevo usuario</a>

    <table border="1" cellpadding="10">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user }}</td>

                <td>
                    <a href="{% url 'editar_usuarios' user.id %}">✏️ Editar</a>

                    <form action="{% url 'eliminar_usuario' user.id %}" method="POST" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit">🗑 Eliminar</button>
                    </form>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">No hay usuarios</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
